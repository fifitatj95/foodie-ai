<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foodie AI</title>
<style>
body{
    font-family:Arial,sans-serif;
    margin:0;
    background:#f7f7f7;
}
header{
    background:#4CAF50;
    color:white;
    padding:20px;
    text-align:center;
}
.container{
    padding:20px;
}
input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:16px;
}
.card{
    background:white;
    padding:15px;
    margin-top:15px;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}
button{
    background:#4CAF50;
    color:white;
    border:none;
    padding:10px 16px;
    border-radius:8px;
    cursor:pointer;
    margin-top:10px;
}
button:hover{
    background:#45a049;
}
#result{
    margin-top:15px;
}
footer{
    position:fixed;
    bottom:0;
    width:100%;
    background:white;
    border-top:1px solid #ddd;
    display:flex;
    justify-content:space-around;
    padding:12px;
}
</style>
</head>
<body>

<header>
<h1>🍽️ Foodie AI</h1>
<p>Your AI Cooking Assistant</p>
</header>

<div class="container">

<input id="ingredients" placeholder="Enter ingredients (e.g. chicken, rice, carrots)">

<button onclick="generateRecipe()">Generate Recipe</button>

<div id="result"></div>

<div class="card">
<h2>⭐ Featured Recipes</h2>
<ul>
<li>🍕 Pizza</li>
<li>🍝 Pasta</li>
<li>🥗 Caesar Salad</li>
<li>🥞 Pancakes</li>
</ul>
</div>

</div>

<footer>
🏠 Home &nbsp; 🔍 Search &nbsp; 🤖 AI &nbsp; ❤️ Favorites
</footer>

<script>
function generateRecipe(){

const text=document.getElementById("ingredients").value.trim();

if(text===""){
alert("Please enter some ingredients.");
return;
}

document.getElementById("result").innerHTML=`
<div class="card">
<h2>🤖 AI Chef</h2>

<p><strong>Ingredients:</strong> ${text}</p>

<h3>Suggested Recipe</h3>

<h4>Easy ${text.split(",")[0]} Dinner</h4>

<p>
1. Heat a pan.<br>
2. Cook your ingredients.<br>
3. Add your favorite seasoning.<br>
4. Simmer for 10 minutes.<br>
5. Serve and enjoy!
</p>

<button onclick="alert('Recipe saved!')">❤️ Save Recipe</button>

</div>
`;

}
</script>

</body>
</html>
